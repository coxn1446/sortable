<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#504AED" />

    <meta name="description" content="Sortable - clarity through choice. Build ranked lists from simple this-or-that decisions." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sortable" />

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.google.com https://www.gstatic.com;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                   img-src 'self' data: https: blob:;
                   font-src 'self' data: https://fonts.gstatic.com;
                   connect-src 'self' https: wss: ws: http://localhost:8080;
                   media-src 'self' https: blob:;
                   frame-src 'self' https:;">

    <link rel="icon" type="image/png" href="/sortable-logo.png" />
    <link rel="apple-touch-icon" href="/sortable-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/splash-shell.css" />

    <title>Sortable</title>

    <style>
      html,
      body {
        background-color: #0f172a;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        function removeNativeHtmlLoader() {
          try {
            var cap = window.Capacitor;
            if (!cap || typeof cap.isNativePlatform !== 'function' || !cap.isNativePlatform()) {
              return false;
            }
            document.documentElement.classList.add('capacitor-native');
            var el = document.getElementById('initial-loader');
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
            return true;
          } catch (e) {
            return false;
          }
        }
        if (!removeNativeHtmlLoader()) {
          document.addEventListener('DOMContentLoaded', removeNativeHtmlLoader);
          window.addEventListener('load', removeNativeHtmlLoader);
        }
      })();
    </script>

    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="initial-loader" class="sortable-splash-shell" aria-hidden="true">
      <div class="sortable-splash-safe">
        <img class="sortable-splash-logo" src="/sortable-logo.png" alt="" width="120" height="120" decoding="async" />
        <p class="sortable-splash-title">Sortable</p>
        <div class="sortable-splash-spinner" role="status" aria-label="Loading"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader');
          if (!loader) return;
          loader.classList.add('sortable-splash-shell--hide');
          setTimeout(function () {
            if (loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 320);
        }, 400);
      });
    </script>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
