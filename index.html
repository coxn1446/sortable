<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3B82F6" />

    <meta name="description" content="Sortable - clarity through choice. Build ranked lists from simple this-or-that decisions." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sortable" />

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.google.com https://www.gstatic.com;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                   img-src 'self' data: https: blob:;
                   font-src 'self' data: https://fonts.gstatic.com;
                   connect-src 'self' https: wss: ws: http://localhost:8080;
                   media-src 'self' https: blob:;
                   frame-src 'self' https:;">

    <link rel="icon" type="image/png" href="/sortable-logo.png" />
    <link rel="apple-touch-icon" href="/sortable-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Sortable</title>

    <style>
      html, body { background-color: #0F172A; }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0F172A;
        z-index: 9999;
      }
      #initial-loader .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #initial-loader .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background-image: linear-gradient(135deg, #6366F1 0%, #3B82F6 100%);
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.45);
      }
      #initial-loader .loader-text {
        color: #F9FAFB;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      #initial-loader .logo { animation: pulse 1.6s ease-in-out infinite; }
      @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
      #initial-loader { animation: fadeOut 0.5s ease-out 10s forwards; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="initial-loader">
      <div class="loader-content">
        <div class="logo"></div>
        <div class="loader-text">Sortable</div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function () { loader.style.display = 'none'; }, 300);
          }
        }, 500);
      });
    </script>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
